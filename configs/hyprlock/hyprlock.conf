# ~/.config/hypr/hyprlock.conf
# Fancy Hyprlock setup: blur + dim, clock/date, greeting, system info, and a polished input field.

general {
    grace = 2
    hide_cursor = false
    ignore_empty_input = true
    fail_timeout = 1500
}

animations {
    enabled = true
    bezier = smoothOut, 0.22, 1, 0.36, 1
    animation = fadeIn, 1, 3.2, smoothOut
    animation = fadeOut, 1, 2.8, smoothOut
    animation = inputFieldDots, 1, 2.2, smoothOut
    animation = inputFieldColors, 1, 2.0, smoothOut
    animation = inputFieldFade, 1, 2.0, smoothOut
}

# Wallpaper + blur
background {
    monitor =
    path = ~/Images/wallpapers/arch6.jpg
    blur_passes = 3
    blur_size = 10
    noise = 0.015
    contrast = 1.05
    brightness = 0.85
    vibrancy = 0.15
    vibrancy_darkness = 0.10
}

# Dim overlay for readability
# (Hyprlock doesn't have a dedicated "overlay" block, but we can emulate it with a full-screen label.)
label {
    monitor =
    text =
    color = rgba(0, 0, 0, 0.35)
    font_size = 1
    position = 0, 0
    halign = center
    valign = center
}

# ===== Top-right time/date =====

label {
    monitor =
    text = $TIME12
    color = rgba(224, 236, 255, 0.96)
    font_size = 64
    font_family = JetBrains Mono ExtraBold
    position = -40, -40
    halign = right
    valign = top
    shadow_passes = 3
    shadow_size = 5
}

label {
    monitor =
    text = cmd[update:1000] date +"%A, %d %b %Y"
    color = rgba(184, 206, 255, 0.88)
    font_size = 16
    font_family = JetBrains Mono Medium
    position = -40, -142
    halign = right
    valign = top
}

# ===== Center "card" =====
# We fake a card using a blank label; then place input field and helper text on it.

label {
    monitor =
    text =
    color = rgba(10, 12, 20, 0.55)
    font_size = 1
    position = 0, 40
    halign = center
    valign = center
}

# Input field: polished + “glass” look
input-field {
    monitor =
    size = 320, 36
    rounding = 11

    outline_thickness = 2
    outer_color = rgba(120, 165, 255, 0.95)
    inner_color = rgba(15, 18, 30, 0.55)

    font_color = rgba(230, 240, 255, 1.0)
    font_family = JetBrains Mono

    dots_size = 0.26
    dots_spacing = 0.20
    dots_center = true

    fade_on_empty = false
    placeholder_text = <i>••••••••</i>
    hide_input = false
    capslock_color = rgba(255, 189, 89, 0.95)
    numlock_color = rgba(115, 178, 255, 0.95)
    bothlock_color = rgba(255, 116, 128, 0.98)
    swap_font_color = true

    position = 0, 28
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 5
}

# Keyboard icon (left of input field)
shape {
    monitor =
    size = 34, 34
    color = rgba(0, 0, 0, 0.00)
    rounding = 10
    border_size = 0
    position = -200, 28
    halign = center
    valign = center
    zindex = 3
}

label {
    monitor =
    text = 󰌌
    color = rgba(177, 199, 255, 0.86)
    font_size = 18
    font_family = Symbols Nerd Font
    position = -200, 28
    halign = center
    valign = center
    zindex = 4
    onclick = /home/vile/.config/hypr/scripts/lock-osk-toggle.sh
}

# Failed-attempt counter (right of input) + auto-reboot on 3 fails
label {
    monitor =
    text = cmd[update:200] sh -lc 'A="$ATTEMPTS"; case "$A" in ""|*[!0-9]*) A=0;; esac; [ "$A" -ge 3 ] && loginctl reboot; if [ "$A" -ge 3 ]; then C="##ff747f"; elif [ "$A" -ge 2 ]; then C="##ffd27a"; else C="##9fc0ff"; fi; printf "<span foreground=\"%s\"><b>%s/3</b></span>\n" "$C" "$A"'
    color = rgba(180, 205, 255, 0.82)
    font_size = 14
    font_family = JetBrains Mono SemiBold
    position = 190, 28
    halign = center
    valign = center
}

# Power actions (bottom-right)
shape {
    monitor =
    size = 36, 36
    color = rgba(0, 0, 0, 0.00)
    rounding = 10
    border_size = 0
    position = -209, 30
    halign = right
    valign = bottom
    zindex = 3
    onclick = loginctl suspend
}

label {
    monitor =
    text = 󰒲
    color = rgba(128, 198, 255, 0.95)
    font_size = 22
    font_family = Symbols Nerd Font
    position = -209, 34
    halign = right
    valign = bottom
    zindex = 4
    onclick = loginctl suspend
    shadow_passes = 2
    shadow_size = 3
}

shape {
    monitor =
    size = 36, 36
    color = rgba(0, 0, 0, 0.00)
    rounding = 10
    border_size = 0
    position = -155, 30
    halign = right
    valign = bottom
    zindex = 3
    onclick = loginctl reboot
}

label {
    monitor =
    text = 󰜉
    color = rgba(255, 200, 120, 0.95)
    font_size = 22
    font_family = Symbols Nerd Font
    position = -155, 34
    halign = right
    valign = bottom
    zindex = 4
    onclick = loginctl reboot
    shadow_passes = 2
    shadow_size = 3
}

shape {
    monitor =
    size = 36, 36
    color = rgba(0, 0, 0, 0.00)
    rounding = 10
    border_size = 0
    position = -101, 30
    halign = right
    valign = bottom
    zindex = 3
    onclick = loginctl poweroff
}

label {
    monitor =
    text = 󰐥
    color = rgba(255, 116, 128, 0.98)
    font_size = 22
    font_family = Symbols Nerd Font
    position = -101, 34
    halign = right
    valign = bottom
    zindex = 4
    onclick = loginctl poweroff
    shadow_passes = 2
    shadow_size = 3
}

# ===== Feedback message =====
# Use PAM prompt state so we don't render two static, overlapping labels.
label {
    monitor =
    text = Locked - Unencrypted
    color = rgba(170, 195, 255, 0.7)
    font_size = 14
    font_family = JetBrains Mono
    position = 0, -30
    halign = center
    valign = center
}
