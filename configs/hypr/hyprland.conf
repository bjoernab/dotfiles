# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=DP-1,1920x1080@500,0x0,1
monitor=HDMI-A-2,1920x1080@60,0x0,1,mirror,DP-1
monitor=,preferred,auto,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = @HOME@/.config/hypr/scripts/open-file-manager.sh
$menu = sh -lc 'command -v rofi >/dev/null 2>&1 && exec rofi -show run'


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = sh -lc 'command -v mako >/dev/null 2>&1 && exec mako'
exec-once = sh -lc '[ -x "@HOME@/.config/mako/detect_ss.sh" ] && exec "@HOME@/.config/mako/detect_ss.sh"'
exec-once = sh -lc '[ -x /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 ] && exec /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1'
exec-once = sh -lc 'command -v hyprpaper >/dev/null 2>&1 && exec hyprpaper'
exec-once = sh -lc '[ -d "@HOME@/.config/eww" ] && command -v eww >/dev/null 2>&1 && exec eww daemon'
exec-once = sh -lc '[ -d "@HOME@/.config/eww" ] && command -v eww >/dev/null 2>&1 && exec eww open bar'
exec-once = sh -lc '[ -x "@HOME@/Scripts/Lock/idle.sh" ] && exec "@HOME@/Scripts/Lock/idle.sh"'
exec-once = sh -lc '[ -x "@HOME@/.config/hypr/scripts/clipboard-history.sh" ] && exec "@HOME@/.config/hypr/scripts/clipboard-history.sh" watch'


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 1

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(a9b4ffee)
    col.inactive_border = rgba(3b3f6baa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 4
    rounding_power = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 0.97
    inactive_opacity = 0.5

    shadow {
        enabled = true
        range = 2
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 4
        passes = 3

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Curves
    bezier = linear,        0,    0,    1,    1
    bezier = smoothOut,     0.22, 1,    0.36, 1
    bezier = smoothInOut,   0.42, 0,    0.15, 1
    bezier = quick,         0.15, 0,    0.1,  1
    bezier = overshot,      0.05, 0.9,  0.1,  1.06
    bezier = outBack,       0.34, 1.56, 0.64, 1

    # Global/frame feel
    animation = global,              1, 8,  smoothInOut
    animation = border,              1, 4,  smoothOut
    animation = borderangle,         1, 30, linear, once

    # Window lifecycle
    animation = windows,             1, 6,  outBack,      slide
    animation = windowsIn,           1, 6,  outBack,      popin 82%
    animation = windowsOut,          1, 4,  smoothInOut,  popin 86%
    animation = windowsMove,         1, 5,  smoothOut

    # Layer motion
    animation = layers,              1, 5,  smoothOut,    slide bottom
    animation = layersIn,            1, 5,  smoothOut,    slide bottom
    animation = layersOut,           1, 4,  smoothInOut,  slide bottom

    # Fade groups
    animation = fade,                1, 4,  smoothInOut
    animation = fadeIn,              1, 4,  smoothOut
    animation = fadeOut,             1, 3,  smoothInOut
    animation = fadeSwitch,          1, 2,  smoothInOut
    animation = fadeShadow,          1, 3,  smoothInOut
    animation = fadeDim,             1, 3,  smoothInOut
    animation = fadeLayers,          1, 3,  smoothInOut
    animation = fadeLayersIn,        1, 2,  smoothOut
    animation = fadeLayersOut,       1, 2,  smoothInOut
    animation = fadePopups,          1, 2,  quick
    animation = fadePopupsIn,        1, 2,  smoothOut
    animation = fadePopupsOut,       1, 2,  smoothInOut
    animation = fadeDpms,            1, 5,  smoothInOut

    # Workspaces
    animation = workspaces,          1, 5,  smoothInOut,  slidefade 12%
    animation = workspacesIn,        1, 5,  smoothOut,    slidefade 12%
    animation = workspacesOut,       1, 5,  smoothInOut,  slidefade 12%
    animation = specialWorkspace,    1, 8,  outBack,      slidefadevert 16%
    animation = specialWorkspaceIn,  1, 8,  outBack,      slidefadevert 16%
    animation = specialWorkspaceOut, 1, 6,  smoothInOut,  slidefadevert 16%

    # Misc
    animation = zoomFactor,          1, 7,  smoothOut
    animation = monitorAdded,        1, 6,  overshot
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
