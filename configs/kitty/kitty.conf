# =============================
# FONT
# =============================

font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Enable ligatures
disable_ligatures never

# =============================
# CURSOR
# =============================

cursor_shape     block
cursor_blink_interval 0.5

# =============================
# SCROLLBACK
# =============================

scrollback_lines 10000
wheel_scroll_multiplier 5.0

# =============================
# WINDOW APPEARANCE
# =============================

window_padding_width 10
background_opacity 0.2
confirm_os_window_close 0

# =============================
# TAB BAR
# =============================

tab_bar_edge top
tab_bar_style powerline
tab_powerline_style angled
tab_title_template "{title}"

# =============================
# COLORS (Dracula-style example)
# =============================

foreground            #f8f8f2
background            #1e2033

selection_foreground  #ffffff
selection_background  #4a4f78

cursor                #a9b4ff
cursor_text_color     #1e2033

active_border_color   #a9b4ff
inactive_border_color #3b3f6b
bell_border_color     #8ea8ff

active_tab_foreground   #1e2033
active_tab_background   #a9b4ff
inactive_tab_foreground #d8dcff
inactive_tab_background #2b2f4b
tab_bar_background      #171a29

color0  #000000
color1  #ff5555
color2  #50fa7b
color3  #f1fa8c
color4  #bd93f9
color5  #ff79c6
color6  #8be9fd
color7  #bbbbbb

color8  #44475a
color9  #ff5555
color10 #50fa7b
color11 #f1fa8c
color12 #bd93f9
color13 #ff79c6
color14 #8be9fd
color15 #ffffff

# =============================
# KEYBINDINGS
# =============================

map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
map ctrl+shift+enter new_window
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+q quit
map ctrl+shift+f5 load_config_file

# =============================
# MOUSE
# =============================

mouse_map right press ungrabbed paste_from_clipboard

# =============================
# MISC
# =============================

enable_audio_bell no
copy_on_select yes
strip_trailing_spaces smart
